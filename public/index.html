<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>%WEB_TITLE%</title>
    <meta
      name="description"
      content="Your AI chief of staff for real work — priorities, daily brief, and next actions."
    />
    <meta name="theme-color" content="#6D19B7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#6D19B7" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chief" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        margin: 0;
        background-color: #f7f7f8;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0c0c0e;
        }
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch((error) => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run Chief.
    </noscript>
    <div id="root"></div>
  </body>
</html>

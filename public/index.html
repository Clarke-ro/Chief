<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>Chief — AI chief of staff for real work</title>
    <meta
      name="description"
      content="Chief is your AI chief of staff. Connect Gmail, Google Calendar, Tasks, and Drive to prioritize your day, get a daily brief, and take the next action."
    />
    <meta name="application-name" content="Chief" />
    <!--
      Google Search Console: replace CONTENT with your URL-prefix verification code,
      then re-deploy. Same Google account must be Owner/Editor on the Cloud project.
    -->
    <!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" /> -->
    <meta name="theme-color" content="#6D19B7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#6D19B7" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chief" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        margin: 0;
        background-color: #f7f7f8;
        font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, 'Segoe UI',
          sans-serif;
        font-size: 18px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0c0c0e;
        }
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        font-family: inherit;
      }
      input,
      textarea,
      button {
        font-family: inherit;
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch((error) => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </head>

  <body>
    <noscript>
      <main style="max-width:40rem;margin:2rem auto;padding:0 1.25rem;font-family:system-ui,sans-serif;line-height:1.5;color:#111">
        <h1>Chief</h1>
        <p>
          Chief is your AI chief of staff for real work. It connects to tools like Gmail, Google
          Calendar, Google Tasks, and Drive to prioritize your day, deliver a daily brief, and help
          you take the next action.
        </p>
        <p>
          <a href="/legal/privacy">Privacy Policy</a>
          ·
          <a href="/legal/terms">Terms of Service</a>
        </p>
      </main>
    </noscript>
    <div id="root"></div>
  </body>
</html>
